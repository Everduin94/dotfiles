# tmux configuration tuned for modern terminal TUIs (including pi).

# Ensure modified Enter/arrow/function-key sequences reach applications.
# Required for pi's modified Enter bindings when running inside tmux.
set -g extended-keys on
set -g extended-keys-format csi-u

# Advertise a modern tmux terminal and true-colour support to applications.
set -g default-terminal "tmux-256color"
set -g terminal-features "*:RGB,xterm*:extkeys"

# Forward focus in/out events so TUIs can refresh or react correctly.
set -g focus-events on

# Make Escape/Alt-key handling feel responsive in terminal UIs.
set -sg escape-time 10

# Allow terminal clipboard/OSC passthrough where supported by the outer terminal.
set -g set-clipboard on
set -g allow-passthrough on

# Let tmux-set pane titles win over app-emitted terminal title escape sequences.
# This keeps pane titles stable when set with: tmux select-pane -T 'my title'
set-window-option -g allow-set-title off

# Prevent tmux from automatically renaming windows.
set-window-option -g automatic-rename off

# Start tmux window and pane numbering at 1.
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Keep pane output visible after a command exits.
set -g remain-on-exit on

# Convenient scrolling/selection inside tmux panes.
set -g mouse on

# Use the terminal's background instead of painting tmux-specific layers.
set -g status-style "bg=default,fg=#cdd6f4"
set -g message-style "bg=default,fg=#cdd6f4"
set -g message-command-style "bg=default,fg=#cdd6f4"

# Make the active pane easier to spot.
# - heavy borders read more clearly than the default thin lines.
# - border indicators add directional hints, especially in the common two-pane layout.
# - inactive panes dim slightly so focus stands out without adding extra labels.
# - copy mode tints the active border green so mode changes are obvious at a glance.
# - switching the active pane or window recalculates the border so mode state does not leak.
set -g pane-border-lines heavy
set -g pane-border-indicators both
set -g pane-border-style "fg=#6c7086"
set -g pane-active-border-style "fg=#89b4fa"
set-hook -g pane-mode-changed "if-shell -F '#{==:#{@pi_easyjump_active},1}' { set-option -g pane-active-border-style fg=#cba6f7 } { if-shell -F '#{==:#{pane_mode},copy-mode}' { set-option -g pane-active-border-style fg=#a6e3a1 } { set-option -g pane-active-border-style fg=#89b4fa } }"
set-hook -g after-select-pane "if-shell -F '#{==:#{@pi_easyjump_active},1}' { set-option -g pane-active-border-style fg=#cba6f7 } { if-shell -F '#{==:#{pane_mode},copy-mode}' { set-option -g pane-active-border-style fg=#a6e3a1 } { set-option -g pane-active-border-style fg=#89b4fa } }"
set-hook -g after-select-window "if-shell -F '#{==:#{@pi_easyjump_active},1}' { set-option -g pane-active-border-style fg=#cba6f7 } { if-shell -F '#{==:#{pane_mode},copy-mode}' { set-option -g pane-active-border-style fg=#a6e3a1 } { set-option -g pane-active-border-style fg=#89b4fa } }"
set-window-option -g window-style "bg=default,dim"
set-window-option -g window-active-style "bg=default"

# Keep pane borders in the normal layout; tmux persists this option until reset.
set -g pane-border-status off

# Keep `Ctrl+b q` pane numbers visible until you press a key.
# Use slate for inactive pane numbers and blue for the active/current pane.
set -g display-panes-colour "#6c7086"
set -g display-panes-active-colour "#89b4fa"
bind-key q display-panes -d 0

# Seamless Ctrl-h/j/k/l pane navigation and Ctrl-n/Ctrl-p window navigation
# across tmux and Neovim. Inspired by tmux.nvim's manual tmux setup.
# Keep these keys aligned with the Neovim mappings in lua/config/keymaps.lua.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?\\.?(view|n?vim?x?)(-wrapped)?(diff)?$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' { if -F '#{pane_at_left}' '' 'select-pane -L' }
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' { if -F '#{pane_at_bottom}' '' 'select-pane -D' }
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' { if -F '#{pane_at_top}' '' 'select-pane -U' }
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' { if -F '#{pane_at_right}' '' 'select-pane -R' }
bind-key -n 'C-n' if-shell "$is_vim" 'send-keys C-n' { if -F '#{window_end_flag}' '' 'select-window -n' }
bind-key -n 'C-p' if-shell "$is_vim" 'send-keys C-p' { if 'test #{window_index} -gt #{base-index}' 'select-window -p' }

bind-key -T copy-mode 'C-h' if -F '#{pane_at_left}' '' 'select-pane -L'
bind-key -T copy-mode 'C-j' if -F '#{pane_at_bottom}' '' 'select-pane -D'
bind-key -T copy-mode 'C-k' if -F '#{pane_at_top}' '' 'select-pane -U'
bind-key -T copy-mode 'C-l' if -F '#{pane_at_right}' '' 'select-pane -R'
bind-key -T copy-mode 'C-n' if -F '#{window_end_flag}' '' 'select-window -n'
bind-key -T copy-mode 'C-p' if 'test #{window_index} -gt #{base-index}' 'select-window -p'

bind-key -T copy-mode-vi 'C-h' if -F '#{pane_at_left}' '' 'select-pane -L'
bind-key -T copy-mode-vi 'C-j' if -F '#{pane_at_bottom}' '' 'select-pane -D'
bind-key -T copy-mode-vi 'C-k' if -F '#{pane_at_top}' '' 'select-pane -U'
bind-key -T copy-mode-vi 'C-l' if -F '#{pane_at_right}' '' 'select-pane -R'
bind-key -T copy-mode-vi 'C-n' if -F '#{window_end_flag}' '' 'select-window -n'
bind-key -T copy-mode-vi 'C-p' if 'test #{window_index} -gt #{base-index}' 'select-window -p'

# Copy-mode feels closer to Vim: use `v` to start selecting and `y` to finish.
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection
bind-key -T copy-mode-vi 'V' send-keys -X select-line
bind-key -T copy-mode-vi 'C-v' send-keys -X rectangle-toggle
bind-key -T copy-mode-vi 'y' if -F '#{selection_present}' 'send-keys -X copy-selection-and-cancel' 'display-message "No selection"'

# Preserve `gg` and add `gx` to open the URL under the copy-mode cursor.
bind-key -T copy-mode-vi 'g' switch-client -T copy-mode-g
bind-key -T copy-mode-g 'g' send-keys -X history-top \; switch-client -T copy-mode-vi
bind-key -T copy-mode-g 'x' run-shell -b 'COPY_CURSOR_HYPERLINK=#{qh:copy_cursor_hyperlink} COPY_CURSOR_LINE=#{qh:copy_cursor_line} COPY_CURSOR_X=#{qh:copy_cursor_x} ~/.config/tmux/scripts/open-copy-mode-url.sh' \; switch-client -T copy-mode-vi
bind-key -T copy-mode-g 'Escape' switch-client -T copy-mode-vi
bind-key -T copy-mode-g 'C-c' switch-client -T copy-mode-vi

# EasyJump everywhere: use Ctrl-] in Neovim, tmux copy-mode, and shell panes.
# Use exact Catppuccin Mocha colours so dim text stays slate and jump labels pop blue.
# Keep EasyJump entering copy mode, but do not auto-start a selection.
set -g @easyjump-key-binding ']'
set -g @easyjump-label-attrs "\e[1m\e[38;2;137;180;250m"
set -g @easyjump-text-attrs "\e[0m\e[38;2;108;112;134m"
set -g @easyjump-auto-begin-selection "off"
bind-key -n 'C-]' if-shell "$is_vim" 'send-keys C-]' "run-shell -b '~/.config/tmux/scripts/easyjump-anywhere.sh'"

# TPM plugins.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'roy2220/easyjump.tmux'

# Initialize TPM.
run '~/.config/tmux/plugins/tpm/tpm'

# Rebind EasyJump after TPM so our wrapper can tint the border mauve
# for the duration of tmux jump mode, including copy-mode tables.
bind-key -T copy-mode 'C-]' run-shell -b '~/.config/tmux/scripts/easyjump-anywhere.sh'
bind-key -T copy-mode-vi 'C-]' run-shell -b '~/.config/tmux/scripts/easyjump-anywhere.sh'
